name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v
        required: true
        type: string
      prerelease:
        description: Mark this release as a prerelease
        required: false
        type: boolean
        default: false
      notes:
        description: Optional release notes
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build And Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release zip
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: pnpm zip

      - name: Collect zip assets
        id: assets
        shell: bash
        run: |
          mapfile -t files < <(find .output -type f -name '*.zip' | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo 'No zip assets were generated.'
            exit 1
          fi

          {
            echo 'files<<EOF'
            printf '%s\n' "${files[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Write release notes
        shell: bash
        run: |
          if [ -n "${{ inputs.notes }}" ]; then
            printf '%s\n' "${{ inputs.notes }}" > RELEASE_NOTES.md
          else
            cat > RELEASE_NOTES.md <<EOF
          ChatCanves v${{ inputs.version }}

          Download the attached zip asset and extract it locally.
          Then open chrome://extensions, enable Developer mode, and load the extracted extension directory.
          EOF
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: ChatCanves v${{ inputs.version }}
          body_path: RELEASE_NOTES.md
          files: ${{ steps.assets.outputs.files }}
          prerelease: ${{ inputs.prerelease }}
