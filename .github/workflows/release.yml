name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v
        required: true
        type: string
      prerelease:
        description: Mark this release as a prerelease
        required: false
        type: boolean
        default: false
      notes:
        description: Optional release notes
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build And Publish Release
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release zip
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: pnpm zip

      - name: Collect zip assets
        id: assets
        shell: bash
        run: |
          mapfile -t files < <(find .output -type f -name '*.zip' | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo 'No zip assets were generated.'
            exit 1
          fi

          {
            echo 'files<<EOF'
            printf '%s\n' "${files[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Write release notes
        shell: bash
        run: |
          if [ -n "${{ inputs.notes }}" ]; then
            printf '%s\n' "${{ inputs.notes }}" > RELEASE_NOTES.md
          else
            cat > RELEASE_NOTES.md <<EOF
          ChatCanves v${{ inputs.version }}

          Download the attached zip asset and extract it locally.
          Then open chrome://extensions, enable Developer mode, and load the extracted extension directory.
          EOF
          fi

      - name: Publish GitHub release
        shell: bash
        run: |
          tag="v${{ inputs.version }}"
          title="ChatCanves v${{ inputs.version }}"
          prerelease_flag=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            prerelease_flag="--prerelease"
          fi

          mapfile -t files <<< "${{ steps.assets.outputs.files }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$title" --notes-file RELEASE_NOTES.md $prerelease_flag
            gh release upload "$tag" "${files[@]}" --clobber
          else
            gh release create "$tag" "${files[@]}" --title "$title" --notes-file RELEASE_NOTES.md --target "$GITHUB_SHA" $prerelease_flag
          fi
